<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prescription Reader</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f0f4f8; min-height: 100vh; padding: 20px; }

        .header {
            background: #185FA5;
            color: white;
            padding: 18px 24px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 24px;
        }
        .header-icon {
            width: 46px; height: 46px;
            background: white;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }
        .header h1 { font-size: 20px; font-weight: 700; }
        .header p { font-size: 13px; color: #B5D4F4; margin-top: 2px; }

        .layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        @media (max-width: 650px) {
            .layout { grid-template-columns: 1fr; }
        }

        .card {
            background: white;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            padding: 20px;
            margin-bottom: 16px;
        }
        .card-title {
            font-size: 12px;
            font-weight: 700;
            color: #185FA5;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .upload-area {
            border: 2px dashed #B5D4F4;
            border-radius: 10px;
            padding: 32px 20px;
            text-align: center;
            background: #E6F1FB;
            cursor: pointer;
            transition: background 0.2s;
        }
        .upload-area:hover { background: #d4e8f7; }
        .upload-area input { display: none; }
        .upload-icon { font-size: 36px; color: #185FA5; display: block; margin-bottom: 10px; }
        .upload-area p { font-size: 15px; color: #0C447C; font-weight: 600; }
        .upload-area span { font-size: 12px; color: #378ADD; margin-top: 4px; display: block; }

        #preview {
            width: 100%;
            max-height: 200px;
            object-fit: contain;
            border-radius: 8px;
            margin-top: 14px;
            display: none;
        }

        .btn {
            background: #185FA5;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            margin-top: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.2s;
        }
        .btn:hover { background: #0C447C; }
        .btn:disabled { background: #94a3b8; cursor: not-allowed; }

        .disclaimer {
            background: #fff8e1;
            border: 1px solid #FAC775;
            border-radius: 8px;
            padding: 12px 14px;
            font-size: 13px;
            color: #633806;
            display: flex;
            gap: 8px;
            align-items: flex-start;
            margin-top: 4px;
        }

        .loading {
            text-align: center;
            color: #185FA5;
            font-size: 15px;
            padding: 20px;
            display: none;
        }
        .spinner {
            width: 30px; height: 30px;
            border: 3px solid #B5D4F4;
            border-top-color: #185FA5;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
